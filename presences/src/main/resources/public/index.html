<!DOCTYPE html>
<html>

	<head>
		<title>Presences (dev)</title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

		<!-- ng-app.js is a classic (sync) script: it installs window.entcore / window.angular
		     before any module code runs. Proxied to staging via the `^/(?=assets)` route. -->
		<script src="/assets/js/entcore/ng-app.js" id="context" type="text/javascript"></script>

		<!-- Dev entrypoints replace the prod /presences/public/dist/application.js bundle.
		     behaviours first so sniplet/rights registration is in place before bootstrap. -->
		<script type="module" src="/ts/behaviours.ts"></script>
		<script type="module" src="/ts/app.ts"></script>

		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<script type="text/ng-template" id="empty"></script>
		<script>
			// No mustache rendering in dev; app reads window.structures lazily.
			var structures = [];
		</script>
	</head>

	<body ng-controller="MainController" class="presences">
		<portal>
			<sniplet template="memento" application="viescolaire"></sniplet>
			<sniplet template="navigation" application="presences"
					 data-ng-show="!(isChild() || isRelative())"></sniplet>
			<container template="main"></container>
		</portal>
	</body>

</html>
